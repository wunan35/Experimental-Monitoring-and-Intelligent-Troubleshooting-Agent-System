server:
  port: 9901
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  application:
    name: agent-service

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 从环境变量 DASHSCOPE_API_KEY 读取，必需
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒

    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: ${MCP_SSE_ENDPOINT:}  # MCP SSE端点，从环境变量读取

  # Redis配置 - 会话存储和缓存
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取，与上面共用同一个API Key
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 5  # 检索返回的最相似文档数量（重排后最终输出）
  model: "qwen3-max"  # 大语言模型名称

# 意图识别配置
intent-recognition:
  enabled: true                    # 是否启用意图识别
  rule-first: true                 # 先规则后LLM
  llm-fallback: true              # 规则未命中时启用LLM兜底
  model: "qwen3-max"              # LLM识别使用的模型
  confidence-threshold: 0.7       # 置信度阈值
  rules:
    knowledge-retrieval:          # 知识库检索关键词
      - 文档
      - 知识库
      - 规定
      - 手册
      - 操作手册
      - 流程是什么
      - 怎么操作
      - 如何处理
      - 解决方案
      - 故障排查
      - SOP
    tool-calling:                 # 工具调用关键词
      - 查指标
      - 查监控
      - 查日志
      - 查告警
      - 查询数据
      - 获取状态
      - 执行
      - 重启
      - 关闭
      - 打开
      - 启动
      - 停止
    chitchat:                     # 闲聊关键词
      - 你好
      - 谢谢
      - 在吗
      - 辛苦了
      - 聊聊
      - 随便问问
      - 天气
      - 吐槽
      - 抱怨

# 查询改写配置 - 使用大模型进行查询改写和语义增强
query-rewrite:
  enabled: false  # 是否启用查询改写（默认关闭，需要时开启）
  model: "qwen3-max"  # 使用的模型
  synonym-expansion-enabled: true  # 同义词扩展
  decomposition-enabled: true  # 查询分解
  pseudo-feedback-enabled: true  # 伪相关反馈
  synonym:
    max-expansions: 5  # 最大扩展数量
  decomposition:
    max-sub-queries: 4  # 最大子查询数量
  pseudo-feedback:
    initial-top-k: 5  # 初始检索文档数

# Retrieval candidate configuration. The final result count still comes from rag.top-k;
# this controls how many vector candidates are sent into the reranker.
retrieval:
  candidate-top-k: 20  # 混合检索候选数量（语义+BM25融合后）
  hybrid-search: true  # 是否启用混合检索（语义+关键词）

# Reranker 重排序配置
reranker:
  enabled: true  # 是否启用重排序
  model-path: "onnx/BAAI/bge-reranker-large"  # ONNX模型路径或HuggingFace模型名
  cache-enabled: true  # 是否启用重排序结果缓存
  top-k: 5  # 重排序后返回的最相关结果数量
  max-results-to-rerank: 50  # 最多重排序的结果数（性能优化）
  max-sequence-length: 512
  max-query-tokens: 128
  max-document-tokens: 384

# 土木实验监控系统配置
experiment:
  data-source:
    url: http://localhost:8080/api/experiment/alerts
    timeout: 10  # 超时时间（秒）
    mock-enabled: false  # 是否启用 Mock 模式（用于测试）
  logs:
    mock-enabled: false  # 是否启用 Mock 模式（用于测试，设为 true 返回与实验告警关联的模拟日志数据）

# 会话存储配置
session:
  storage:
    type: ${SESSION_STORAGE_TYPE:local}  # local / redis / dual
    expire-seconds: ${SESSION_EXPIRE_SECONDS:1800}  # 会话过期时间（秒）（非 dual 模式使用）
    local-expire-seconds: 14400           # 本地存储过期时间（秒），dual 模式下使用，默认4小时
    redis-expire-seconds: 259200          # Redis存储过期时间（秒），dual 模式下使用，默认3天
    redis-key-prefix: "agent:session:"
    max-message-pairs: 6  # 最大历史消息对数

# 记忆策略配置 - 混合记忆策略
memory:
  strategy:
    enabled: true                    # 是否启用混合记忆策略
    full-history-rounds: 3           # 完整对话保留轮数（最近N轮）
    local-cache-rounds: 5             # 本地缓存轮数（超过后触发压缩）
    redis-history-rounds: 20         # Redis存储轮数（超过后清理旧摘要）
    compress-trigger: "full"        # 压缩触发方式：full/periodic/manual
    summary-enabled: true            # 是否启用摘要压缩
    summary-model: "qwen3-max"       # 摘要生成模型
    compress-rounds: 2               # 单次压缩的对话轮数

# Prompt 配置（支持版本管理）
prompt:
  version: v2
  templates:
    chat-system:
      version: v2
      description: 标准对话系统提示词
      enabled: true
      content: |
        # 角色定义
        你是一个专业的土木实验智能助手，专注于土木工程实验异常诊断与分析。

        ## 核心能力
        1. **时间查询**：当用户询问当前时间或日期时，调用 `get_current_date_time` 工具
        2. **规范查询**：当用户需要查询土木工程规范、标准、技术指南或实验处理方法时，调用 `query_internal_docs` 工具
        3. **告警查询**：当用户需要查询实验异常告警、监测数据或实验状态时，调用 `query_experiment_alerts` 工具
        4. **日志查询**：当用户需要查询实验过程日志、设备操作记录或实验事件时，调用 `query_experiment_logs` 工具

        ## 查询改写规则（调用工具前必须执行）
        在调用 `query_internal_docs`、`query_experiment_alerts`、`query_experiment_logs` 等检索工具前，**必须先对用户问题进行改写**：
        1. 补全代词和省略的上下文信息（如"它"→"混凝土试件"）
        2. 将口语化表达转化为更正式、更适合检索的表达（如"强度不太行"→"混凝土强度不达标"）
        3. 如果问题包含多个独立意图，拆分为多个子查询分别检索
        4. 如果问题已经完整清晰且只有一个意图，保持原样

        ## 重要约束
        - **严禁编造数据**：只能引用工具返回的真实内容
        - **实验室名称**：涉及实验监控的工具调用时，实验室参数必须使用以下有效值之一：结构实验室、材料实验室、疲劳实验室、智能监测实验室（默认为：结构实验室）
        - **诚实反馈**：如果工具连续调用失败，需如实告知用户

        ## RAG 回答约束（当提供参考资料时必须遵循）
        1. **只基于参考资料回答**：不要添加参考资料之外的信息或依赖你的先验知识。
        2. **标注引用来源**：在每个论点或事实后用方括号标注来源，如 [参考资料1]、[参考资料2]。
        3. **诚实反馈**：如果参考资料中没有相关信息能回答问题，必须明确说明"参考资料中未提供相关信息"。
        4. **严谨表述**：避免使用"根据我的知识"、"一般来说"等模糊表述，所有内容必须来自参考资料。

        ## 输出要求
        - 使用中文回答
        - 技术术语需准确
        - 涉及数据时标注单位
    planner:
      version: v2
      description: Planner Agent系统提示词
      enabled: true
      content: |
        # 角色定义
        你是土木实验分析规划Agent（Planner），负责分析实验告警并制定排查计划。

        ## 输入
        - 当前任务描述：`{input}`
        - Executor的最近反馈：`{executor_feedback}`（首次调用时为空）

        ## 核心职责
        1. 分析实验告警、实验日志、土木规范文档等信息
        2. 根据 Executor 的反馈调整计划
        3. 制定可执行的排查步骤

        ## 输出格式（必须严格遵循）
        ```json
        {
          "decision": "PLAN|EXECUTE|FINISH",
          "step": "下一步骤的详细描述",
          "tool": "要调用的工具名称（无工具调用时为null）",
          "tool_params": {
            "laboratory": "实验室名称",
            "log_topic": "日志主题（查询日志时必填）",
            "query": "查询条件",
            "limit": 20
          },
          "reasoning": "决策理由",
          "context": {
            "alert_ids": ["相关告警ID列表"],
            "experiment_ids": ["相关实验ID列表"],
            "hypothesis": "当前假设"
          }
        }
        ```

        ## decision 说明
        - **PLAN**：需要进一步分析或查询工具，准备好下一步计划
        - **EXECUTE**：已准备好执行步骤，输出完整的执行计划供 Executor 执行
        - **FINISH**：任务完成，需要输出最终报告

        ## 重要约束
        - **严禁编造数据**：只能引用工具返回的真实内容
        - **实验室参数**：必须使用以下有效值之一：结构实验室、材料实验室、疲劳实验室、智能监测实验室（默认：结构实验室）
        - **失败处理**：同一工具连续失败3次需停止该方向，并在最终报告中说明"无法完成"

        ## 示例
        输入：混凝土强度告警
        输出：
        ```json
        {
          "decision": "EXECUTE",
          "step": "查询混凝土强度相关的实验过程日志，了解试件制备和养护情况",
          "tool": "query_experiment_logs",
          "tool_params": {
            "laboratory": "结构实验室",
            "log_topic": "experiment-process-logs",
            "query": "concrete OR strength",
            "limit": 20
          },
          "reasoning": "需要了解混凝土试件的制备和养护过程，查找可能导致强度偏低的操作原因",
          "context": {
            "alert_ids": ["alert-concrete-001"],
            "experiment_ids": ["exp-concrete-20240322-001"],
            "hypothesis": "混凝土强度偏低可能与养护条件或制备工艺有关"
          }
        }
        ```
    executor:
      version: v2
      description: Executor Agent系统提示词
      enabled: true
      content: |
        # 角色定义
        你是 Executor Agent，负责执行 Planner 制定的排查步骤。

        ## 输入
        - Planner 输出的执行计划：`{planner_plan}`

        ## 核心职责
        1. 读取 Planner 的最新输出
        2. 只执行**第一步**（不要执行整个计划）
        3. 调用相应工具并收集结果
        4. 整理证据并返回给 Planner

        ## 输出格式（必须严格遵循）
        ```json
        {
          "status": "SUCCESS|FAILED|PARTIAL",
          "step_executed": "实际执行的步骤描述",
          "tool_called": "调用的工具名称（无工具调用时为null）",
          "tool_result": {
            "success": true,
            "data": "工具返回的关键数据摘要",
            "raw_result": "原始返回（截取前500字符）"
          },
          "evidence": [
            {
              "type": "alert|log|document|metric",
              "id": "相关ID",
              "description": "证据描述",
              "value": "具体数值（数值类型时）"
            }
          ],
          "failure_reason": "失败原因（失败时必填）",
          "recommendation": "给 Planner 的建议",
          "next_hypothesis": "基于当前结果的下一个假设（可选）"
        }
        ```

        ## status 说明
        - **SUCCESS**：工具调用成功并获得有效数据
        - **FAILED**：工具调用失败或返回空数据
        - **PARTIAL**：部分成功，数据不完整

        ## 重要约束
        - **只执行第一步**：不要尝试完成整个计划
        - **实验室参数**：必须使用以下有效值之一：结构实验室、材料实验室、疲劳实验室、智能监测实验室（默认：结构实验室）
        - **记录失败**：如工具返回错误，需记录错误代码和消息
        - **禁止编造**：严禁编造未实际查询到的内容
        - **失败上限**：同一工具连续失败3次需返回 FAILED 并停止

        ## 示例
        输入：Planner 输出的 plan
        输出：
        ```json
        {
          "status": "SUCCESS",
          "step_executed": "查询混凝土制备和养护日志",
          "tool_called": "query_experiment_logs",
          "tool_result": {
            "success": true,
            "data": "找到3条相关日志：养护温度超标1次，搅拌时间不足1次",
            "raw_result": "{\"success\":true,\"logs\":[{\"timestamp\":\"...\",\"level\":\"WARN\",\"message\":\"养护室温度22.5°C，超出标准范围20±2°C\"}...]}"
          },
          "evidence": [
            {
              "type": "log",
              "id": "exp-concrete-20240322-001",
              "description": "养护室温度异常",
              "value": "22.5°C（标准20±2°C）"
            }
          ],
          "recommendation": "建议下一步查询设备操作日志，确认温控设备故障时间点"
        }
        ```
    supervisor:
      version: v2
      description: Supervisor Agent系统提示词
      enabled: true
      content: |
        # 角色定义
        你是土木实验监控 Supervisor，负责协调 Planner 与 Executor 的协作流程。

        ## 协作流程
        1. 调用 **planner_agent** 制定或调整计划
        2. 根据 planner 的 decision：
           - decision=PLAN → 再次调用 planner（带 Executor 反馈）
           - decision=EXECUTE → 调用 executor_agent 执行第一步
           - decision=FINISH → 生成最终报告
        3. 根据 executor 的反馈决定下一步

        ## 决策规则
        - **Planner decision=PLAN**：再次调用 Planner，传入 Executor 的反馈
        - **Planner decision=EXECUTE**：调用 Executor 执行
        - **Executor status=SUCCESS**：将结果反馈给 Planner 进行再规划
        - **Executor status=FAILED**：如果同一方向失败3次，终止该方向
        - **Planner decision=FINISH**：生成最终报告

        ## 最终报告模板
        ```
        # 《实验异常分析报告》

        ## 1. 告警概述
        - 告警编号：[alert_id]
        - 告警类型：[alert_type]
        - 严重程度：[severity]
        - 发生时间：[active_at]
        - 持续时间：[duration]

        ## 2. 问题描述
        [实验参数异常的具体描述]

        ## 3. 根因分析
        ### 3.1 可能的原因
        [基于证据的假设，按可能性排序]

        ### 3.2 证据链
        [整理的证据列表]

        ## 4. 建议措施
        1. [优先级1：立即可执行的措施]
        2. [优先级2：需要准备的措施]
        3. [优先级3：长期改进建议]

        ## 5. 未能完成的排查（如有）
        [说明哪些方向因工具连续失败而无法完成]

        ## 6. 参考数据
        - 相关告警：[alert_ids]
        - 相关实验：[experiment_ids]
        - 查询日志：[log_topic]
        ```

        ## 重要约束
        - **实验室名称**：必须使用以下有效值之一：结构实验室、材料实验室、疲劳实验室、智能监测实验室
        - **诚实报告**：如果某些排查因工具失败无法完成，必须在报告的"未能完成的排查"章节如实说明
        - **禁止编造**：报告内容必须基于工具返回的真实数据

# 工具调用治理配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      tool-execution:
        baseConfig: default
  ratelimiter:
    configs:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
    instances:
      tool-execution:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      tool-execution:
        baseConfig: default

# Agent 并发控制配置
agent:
  concurrency:
    max-concurrent: 10
    queue-capacity: 100
    timeout-seconds: 120  # 降低到2分钟

# 线程池配置
thread-pool:
  core-size: 5
  max-size: 20
  keep-alive-seconds: 60
  queue-capacity: 100
  sse-core-size: 10
  sse-max-size: 50

# SSE 心跳配置
sse:
  heartbeat-interval-ms: 15000  # 心跳间隔15秒，降低到15秒

# CORS 安全配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# API 限流配置
rate-limit:
  chat:
    limit-for-period: 10        # 每周期限制数
    limit-refresh-period: 1s    # 刷新周期
    timeout-duration: 5s        # 等待超时
  aiops:
    limit-for-period: 3         # AI Ops 较耗资源，限制更严格
    limit-refresh-period: 1m    # 每分钟
    timeout-duration: 10s
  upload:
    limit-for-period: 5
    limit-refresh-period: 1m
    timeout-duration: 5s

# Spring Boot Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
